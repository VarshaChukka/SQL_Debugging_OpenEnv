name: sql-debug-env
description: SQL debugging REPL environment
version: 1.0

tasks:
  - id: 0
    name: easy
  - id: 1
    name: medium
  - id: 2
    name: hard

observation_space:
  type: object
  properties:
    problem:
      type: string
    db_schema:
      type: string
    last_error:
      type: string
    query_result:
      type: string

action_space:
  type: object
  properties:
    sql_query:
      type: string

reward:
  type: object
  properties:
    score:
      type: number
    feedback:
      type: string
